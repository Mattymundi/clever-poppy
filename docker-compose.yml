services:
  postgres:
    image: postgres:16-alpine
    container_name: clever-poppy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cleverpoppy
      POSTGRES_PASSWORD: cleverpoppy_dev
      POSTGRES_DB: cleverpoppy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
